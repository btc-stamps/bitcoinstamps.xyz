name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Documentation Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for per-page git lastmod in sitemap

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run docs:build

      - name: Run LEO API Tests
        run: npm run test:leo-api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: documentation-site
          path: dist/
          retention-days: 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: documentation-site
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bitcoinstamps-xyz

      # Ping IndexNow (Bing/Yandex/Seznam + downstream AI search) after a
      # successful production deploy so freshly-published URLs get re-indexed.
      # Uses the verification key already deposited at
      # docs/public/<key>.txt -> https://bitcoinstamps.xyz/<key>.txt
      # Non-fatal: never fails the deploy if the ping errors.
      - name: Submit URLs to IndexNow
        continue-on-error: true
        env:
          INDEXNOW_KEY: '0969209b92a6412c950847099b3e62f2'
          INDEXNOW_HOST: 'bitcoinstamps.xyz'
        run: |
          set +e
          SITEMAP="dist/sitemap.xml"
          if [ ! -f "$SITEMAP" ]; then
            echo "::warning::sitemap.xml not found at $SITEMAP — skipping IndexNow submission"
            exit 0
          fi
          # Extract <loc> URLs from the sitemap
          URLS=$(grep -oE '<loc>[^<]+</loc>' "$SITEMAP" | sed -E 's#</?loc>##g')
          if [ -z "$URLS" ]; then
            echo "::warning::No URLs found in sitemap — skipping IndexNow submission"
            exit 0
          fi
          COUNT=$(printf '%s\n' "$URLS" | grep -c .)
          echo "Submitting $COUNT URLs to IndexNow..."
          # Build the JSON payload (urlList as a JSON array of the sitemap URLs)
          PAYLOAD=$(printf '%s\n' "$URLS" | jq -R -s -c \
            --arg host "$INDEXNOW_HOST" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "https://$INDEXNOW_HOST/$INDEXNOW_KEY.txt" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: (split("\n") | map(select(length > 0)))}')
          HTTP_CODE=$(curl -sS -o /tmp/indexnow_resp.txt -w '%{http_code}' \
            -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data "$PAYLOAD")
          echo "IndexNow HTTP status: $HTTP_CODE"
          cat /tmp/indexnow_resp.txt 2>/dev/null || true
          # IndexNow returns 200/202 on success; never fail the deploy on this signal.
          exit 0

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: documentation-site
          path: dist

      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bitcoinstamps-xyz --branch=${{ github.head_ref }}

      - name: Comment Preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const previewUrl = `https://${branch}.bitcoinstamps-xyz.pages.dev`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment\n\n**Preview URL:** ${previewUrl}\n\nDeployed from branch \`${branch}\``
            });
